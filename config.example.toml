# QQ 空间说说定时抓取配置示例
# 复制此文件为 config.toml 并按需修改

[auth]
# 你的 QQ 号
uin = 123456789
# 检测到登录失效时，自动发起重新登录并将二维码发送至 Telegram（需配置 [telegram]）
# 启用后，crontab 再次触发时若 setup 进程仍在等待扫码，会自动跳过避免重复发送
auto_relogin = false

[storage]
# Cookie 和状态文件的存储目录（支持 ~ 路径）
data_dir = "~/.local/share/qzone-cron"

[fetch]
# 每次运行最多抓取的页数（每页约 10-20 条说说）
max_pages = 10
# 备用时间窗口（小时）：仅在从未运行过（无状态文件）时生效
time_window_hours = 24.0
# 抓取间隔（分钟）：Crontab 可高频运行（如每分钟），但实际抓取按此间隔执行。
# 两次抓取之间的 Crontab 触发仅运行插件维护任务（如 auto_delete_plugin 的到期删除）。
fetch_interval_minutes = 5

# ─── 全局 Telegram 通知 ───────────────────────────────────────────────────────
# 配置后，主流程（如检测到登录失效）和各插件均可通过全局 send_notice 发送通知。
[telegram]
# Telegram Bot Token（通过 @BotFather 创建）
bot_token = "123456:ABC-..."
# 发送目标的 Chat ID（个人用户、群组或频道均可）
chat_id = "-1001234567890"

# ─── 插件配置 ────────────────────────────────────────────────────────────────
# 每个在 plugins/ 目录中的 .py 文件对应一个插件，文件名（不含 .py）作为配置键。

[plugins.print_plugin]
# 是否启用此插件，默认 true
enabled = true

# ─── 每日空间简报插件 ─────────────────────────────────────────────────────────
[plugins.daily_summary_plugin]
enabled = true
# 每天推送简报的时间点列表（本地时间，HH:MM 格式，可配置多个）
summary_times = ["08:00"]
# 特别关注的 QQ 号列表（这些人的动态在简报中单独高亮展示）
vip_uins = []

[plugins.daily_summary_plugin.openai]
# OpenAI 兼容接口的 API Key
api_key = "sk-..."
# 接口地址，默认为 OpenAI 官方，可替换为 Azure/Claude/本地 LLM 等兼容接口
base_url = "https://api.openai.com/v1"
# 使用的模型名称（用于生成简报）
model = "gpt-4o-mini"
# 图片预描述：说说入队时自动调用视觉模型描述图片内容，让简报更真实（默认开启）
# describe_images = true
# 可选：单独指定视觉模型；不填则复用 model 字段的模型
# vision_model = "gpt-4o-mini"
# 可选：覆盖默认的系统提示词
# system_prompt = "你是一位 QQ 空间简报助手..."
